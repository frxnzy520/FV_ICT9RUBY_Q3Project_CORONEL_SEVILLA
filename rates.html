    <label id="text">Pick up location:</label><br>
<select id="pickup">
  <option value="0">Santolan</option>
  <option value="1.7">Katipunan</option>
  <option value="2.4">Anonas</option>
  <option value="4.7">Betty Go-Belmonte</option>
  <option value="5">Araneta Center-Cubao</option>
  <option value="6.7">Gilmore</option>
  <option value="7">J. Ruiz</option>
  <option value="9">Pureza</option>
  <option value="9.4">V. Mapa</option>
  <option value="11.5">Legarda</option>
  <option value="13">Recto</option>
</select>

          <br><br>

        <label id="text">Drop off location:</label><br>
<select id="dropoff">
  <option value="0">Santolan</option>
  <option value="1.7">Katipunan</option>
  <option value="2.4">Anonas</option>
  <option value="4.7">Betty Go-Belmonte</option>
  <option value="5">Araneta Center-Cubao</option>
  <option value="6.7">Gilmore</option>
  <option value="7">J. Ruiz</option>
  <option value="9">Pureza</option>
  <option value="9.4">V. Mapa</option>
  <option value="11.5">Legarda</option>
  <option value="13">Recto</option>
</select>

  <br><br><br>

        <div class="d-flex align-items-start justify-content-center mb-3 mb-lg-0">
      <kbd id="fare" class="p-4">Fare:
      </kbd>
    </div>

              <br><br>

              <input type="checkbox" id="disc" hidden>

           
    
             <button type="button" class="btn btn-primary mt-3" id="regular"
        onclick="document.getElementById('disc').checked=false; calculateFare();">Regular Fare
      </button>
      <button type="button"
        class="btn btn-primary mt-3" id="discounted"
        onclick="document.getElementById('disc').checked=true; calculateDiscountedFare();"> Discounted Fare</button>
      </div>


            
        
   




        <script> 

        function calculateFare() {
           let pickup, dropoff, basefare, baseKM, perKMrate, distance, extraKM, discount;

            pickup = parseFloat(document.getElementById("pickup").value);
            dropoff = parseFloat(document.getElementById("dropoff").value);
            basefare = 50;
            baseKM = 2; 
            perKMrate = 15; 
            discount = document.getElementById("disc").checked;
            distance = Math.max(Math.abs(dropoff-pickup),0); 
            extraKM = Math.max(distance - baseKM, 0);
            let fare = basefare + (extraKM * perKMrate);
            document.getElementById("fare").innerHTML = "Php: " + fare.toFixed(2);
          

    

        }

        function calculateDiscountedFare() {
           let pickup, dropoff, basefare, baseKM, perKMrate, distance, extraKM, discount;

            pickup = parseFloat(document.getElementById("pickup").value);
            dropoff = parseFloat(document.getElementById("dropoff").value);
            basefare = 50;
            baseKM = 2; 
            perKMrate = 15; 
            discount = document.getElementById("disc").checked;
            distance = Math.max(Math.abs(dropoff-pickup),0); 
            extraKM = Math.max(distance - baseKM, 0);
            let fare = basefare + (extraKM * perKMrate);
            fare = fare * (1 - 0.2 * discount);
            document.getElementById("fare").innerHTML = "Php: " + fare.toFixed(2);
          
        }

      

    

        </script>
